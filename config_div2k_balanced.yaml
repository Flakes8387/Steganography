# DIV2K Configuration for Balanced Training (RTX 3050 6GB)
# Training time: ~1 hour (faster configuration)
# Use for: Good quality with reasonable training time

# Random seed
seed: 42

# Model Architecture
model:
  image_size: 128          # Patch size (128x128 pixels)
  message_length: 32       # REQUIRED: 16 or 32 bits only

# Training
training:
  num_epochs: 50           # Reduced for faster training
  batch_size: 4            # REQUIRED: Batch size must be 4 for DIV2K
  learning_rate: 0.0001    # Increased for faster convergence
  weight_decay: 0.0        # Adam optimizer weight decay
  save_freq: 5             # Save checkpoints every 5 epochs
  seed: 42                 # Random seed for reproducibility
  
  # Early stopping (optimized for faster training)
  early_stopping_patience: 10  # Stop if no improvement for 10 epochs
  early_stopping_metric: 'bit_accuracy'
  early_stopping_min_delta: 0.005
  
  # Loss weights
  message_loss_weight: 5.0
  
  # Gradient clipping
  gradient_clip: 1.0

# GPU Optimizations
gpu:
  device: "cuda"
  cudnn_benchmark: true
  mixed_precision: true    # AMP for faster training

# Data Loading - BALANCED for quality and speed
data:
  num_workers: 8
  train_dir: "data/DIV2K/train"
  val_dir: null
  dataset_type: "DIV2K"    # Explicit DIV2K dataset type
  
  # BALANCED: Use 500 base images (recommended)
  # Total samples: 500 images × 4 patches = 2000 training samples
  max_train_images: 500    # Balanced: good quality, reasonable time
  max_val_images: 100
  
  # Patch-based loading - Randomly sampled each epoch
  use_patches: true
  patches_per_image: 4     # 4 random crops per image
  random_crop: true        # Maximum diversity

# Distortions - JPEG-only robust training
distortions:
  # Phase 1: Clean training (until 75% bit accuracy)
  resize: 
    enabled: false
    probability: 0.0
  
  noise:
    enabled: false
    probability: 0.0
  
  jpeg:
    enabled: true
    probability: 0.0       # Starts at 0.0, enabled at 75% bit accuracy
    quality_min: 50
    quality_max: 95
    
  # Two-phase training threshold
  jpeg_only_threshold: 0.75  # Enable JPEG at 75% bit accuracy
  jpeg_only_probability: 0.1 # 10% chance when enabled

# Logging
logging:
  tensorboard: true
  log_dir: "runs"
  print_freq: 10
  plot_freq: 5             # Generate plots every 5 epochs
